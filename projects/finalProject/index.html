<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Rocket League Lite</title>
    <style>
      canvas {
          display: block;
          width: 100%;
          height: 100%;
      }

            .keys .key-btn {
                    display: inline-block;
                    min-width: 20px;
                    padding: 2px 6px;
                    margin-right: 8px;
                    border: 1px solid #aaa;
                    border-radius: 4px;
                    background: rgba(255, 255, 255, 0.12);
                    color: #fff;
                    text-align: center;
                    font-weight: 700;
                    font-size: 12px;
            }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.179.1/examples/jsm/",
                    "tw": "https://cs.wellesley.edu/~cs307/threejs/libs/tw-fa25.js",
                    "gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.20/+esm",
                    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js",
                    "cannon-es-debugger": "https://cdn.jsdelivr.net/npm/cannon-es-debugger@1.0.0/dist/cannon-es-debugger.js",
                    "gltf-loader": "https://cdn.jsdelivr.net/npm/gltf-loader@1.0.0/index.min.js"
                }
            }
</script>
<script type="module" src="js/main.js"></script>
<div class="keys">
    <p><span class="key-btn">WASD</span>Move Car</p>
    <p><span class="key-btn">SPACE</span>Jump</p>
    <p><span class="key-btn">B</span>Brake</p>
    <p><span class="key-btn">R</span>Reset Ball</p>
    <p><span class="key-btn">F</span>Toggle Ball Cam</p>
    <p><span class="key-btn">T</span>Car Recovery Flip</p>
    <p><span class="key-btn">X</span>Toggle Axes</p>
</div>

</body>
</html>
